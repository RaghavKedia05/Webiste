<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vasantra — Royal Saree Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --maroon:#7B1818;
  --gold:#C4922A;
  --gold-light:#E8B84B;
  --cream:#FDF8F2;
  --cream-dark:#F5EDE0;
  --dark:#1A0800;
  --dark2:#2D1408;
  --text:#3D1C08;
  --text-muted:#8B6B55;
  --border:#E8D5BE;
  --white:#FFFFFF;
  --shadow:0 4px 24px rgba(26,8,0,0.10);
  --shadow-lg:0 8px 48px rgba(26,8,0,0.16);
}
html{scroll-behavior:smooth}
body{font-family:'Josefin Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Cormorant Garamond',serif}
img{max-width:100%;display:block}
button{cursor:pointer;border:none;background:none;font-family:'Josefin Sans',sans-serif}
a{text-decoration:none;color:inherit}
input,select,textarea{font-family:'Josefin Sans',sans-serif}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream-dark)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* Loader */
.page-loader{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s}
.page-loader.hidden{opacity:0;pointer-events:none}
.loader-logo{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:3rem;letter-spacing:.3em;margin-bottom:1rem}
.loader-bar{width:120px;height:2px;background:rgba(196,146,42,.3);position:relative;overflow:hidden;border-radius:1px}
.loader-bar::after{content:'';position:absolute;left:-100%;top:0;height:100%;width:100%;background:var(--gold);animation:load 1.2s ease-in-out infinite}
@keyframes load{0%{left:-100%}100%{left:100%}}

/* Navbar */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .3s}
.navbar.scrolled{background:rgba(253,248,242,.97);box-shadow:0 2px 20px rgba(26,8,0,.08);backdrop-filter:blur(10px)}
.nav-top{background:var(--maroon);color:var(--gold-light);text-align:center;padding:.4rem;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase}
.nav-main{display:flex;align-items:center;justify-content:space-between;padding:.8rem 3rem;background:transparent}
.navbar.scrolled .nav-main{padding:.6rem 3rem}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--dark);letter-spacing:.1em}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text);font-weight:500;transition:color .2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transition:transform .3s;transform-origin:left}
.nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1)}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.nav-actions{display:flex;align-items:center;gap:1.2rem}
.nav-btn{background:none;border:none;cursor:pointer;padding:.3rem;color:var(--dark);transition:color .2s;position:relative}
.nav-btn:hover{color:var(--gold)}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--maroon);color:#fff;font-size:.6rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
.nav-cta{background:var(--maroon);color:var(--gold-light);padding:.55rem 1.5rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;font-weight:600;transition:all .2s;border-radius:1px}
.nav-cta:hover{background:var(--gold);color:var(--dark)}

/* Hero */
.hero{height:100vh;position:relative;overflow:hidden;display:flex;align-items:center}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s}
.hero-slide.active{opacity:1}
.hero-bg{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(105deg,rgba(26,8,0,.72) 0%,rgba(26,8,0,.3) 50%,transparent 100%)}
.hero-content{position:relative;z-index:2;max-width:620px;padding:0 3rem}
.hero-tag{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-light);margin-bottom:1.5rem;display:flex;align-items:center;gap:.8rem}
.hero-tag::before{content:'';display:inline-block;width:40px;height:1px;background:var(--gold)}
.hero-title{font-size:4.5rem;line-height:1.05;color:var(--white);font-weight:600;margin-bottom:1.5rem}
.hero-title em{color:var(--gold-light);font-style:italic}
.hero-desc{color:rgba(255,255,255,.8);font-size:.88rem;line-height:1.8;letter-spacing:.05em;margin-bottom:2.5rem;max-width:440px}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{background:var(--gold);color:var(--dark);padding:.9rem 2.5rem;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .25s;border-radius:1px;display:inline-flex;align-items:center;gap:.6rem}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(196,146,42,.4)}
.btn-outline{border:1.5px solid rgba(255,255,255,.6);color:#fff;padding:.9rem 2.5rem;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .25s;border-radius:1px;display:inline-flex;align-items:center;gap:.6rem}
.btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.1)}
.hero-dots{position:absolute;bottom:2.5rem;left:3rem;display:flex;gap:.6rem;z-index:3}
.hero-dot{width:24px;height:3px;background:rgba(255,255,255,.35);transition:all .3s;cursor:pointer;border-radius:2px}
.hero-dot.active{width:48px;background:var(--gold)}
.hero-scroll{position:absolute;right:3rem;bottom:2.5rem;z-index:3;display:flex;flex-direction:column;align-items:center;gap:.6rem;color:rgba(255,255,255,.6);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase}
.scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollAnim 2s ease-in-out infinite}
@keyframes scrollAnim{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

/* Stats bar */
.stats-bar{background:var(--dark);padding:1.2rem 3rem;display:flex;justify-content:space-around}
.stat-item{text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold);font-weight:600}
.stat-label{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:.2rem}

/* Section */
.section{padding:6rem 3rem}
.section-header{text-align:center;margin-bottom:4rem}
.section-tag{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.section-title{font-size:3rem;color:var(--dark);line-height:1.1;font-weight:600}
.section-title em{color:var(--maroon);font-style:italic}
.section-divider{width:60px;height:2px;background:linear-gradient(to right,var(--gold),var(--maroon));margin:.8rem auto 0}
.section-sub{color:var(--text-muted);font-size:.85rem;letter-spacing:.05em;margin-top:1rem}

/* Categories */
.categories-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1.5rem}
.cat-card{position:relative;overflow:hidden;border-radius:2px;cursor:pointer;aspect-ratio:3/4}
.cat-card:first-child{grid-column:span 2;aspect-ratio:auto}
.cat-img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.cat-card:hover .cat-img{transform:scale(1.07)}
.cat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,8,0,.75) 0%,rgba(26,8,0,.1) 60%)}
.cat-info{position:absolute;bottom:0;left:0;right:0;padding:1.5rem}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#fff;font-weight:600;margin-bottom:.3rem}
.cat-count{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-light)}
.cat-arrow{position:absolute;right:1.2rem;bottom:1.5rem;width:36px;height:36px;border:1.5px solid rgba(196,146,42,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.cat-card:hover .cat-arrow{background:var(--gold);border-color:var(--gold)}
.cat-arrow svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2}

/* Products */
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem}
.product-card{background:var(--white);border-radius:2px;overflow:hidden;transition:all .3s;cursor:pointer;border:1px solid var(--border)}
.product-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.product-img-wrap{position:relative;overflow:hidden;aspect-ratio:3/4}
.product-img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.product-card:hover .product-img{transform:scale(1.05)}
.product-badges{position:absolute;top:.8rem;left:.8rem;display:flex;flex-direction:column;gap:.4rem}
.badge{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .7rem;border-radius:1px;font-weight:600}
.badge-new{background:var(--dark);color:var(--gold-light)}
.badge-sale{background:var(--maroon);color:#fff}
.badge-hot{background:var(--gold);color:var(--dark)}
.product-actions{position:absolute;right:.8rem;top:.8rem;display:flex;flex-direction:column;gap:.4rem;opacity:0;transform:translateX(10px);transition:all .3s}
.product-card:hover .product-actions{opacity:1;transform:translateX(0)}
.action-btn{width:36px;height:36px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:all .2s}
.action-btn:hover{background:var(--gold);color:var(--white)}
.action-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5}
.action-btn.wishlisted svg{fill:var(--maroon);stroke:var(--maroon)}
.product-info{padding:1.2rem}
.product-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;margin-bottom:.3rem;color:var(--dark);line-height:1.3}
.product-fabric{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted)}
.product-pricing{display:flex;align-items:center;gap:.8rem;margin-top:.8rem}
.product-price{font-size:1.1rem;font-weight:600;color:var(--maroon);font-family:'Cormorant Garamond',serif}
.product-original{font-size:.85rem;color:var(--text-muted);text-decoration:line-through}
.product-discount{font-size:.65rem;background:var(--cream-dark);color:var(--gold);padding:.2rem .5rem;border-radius:1px;font-weight:600;letter-spacing:.05em}
.product-colors{display:flex;gap:.4rem;margin-top:.8rem}
.color-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:1.5px solid var(--border);transition:transform .2s}
.color-dot:hover,.color-dot.active{transform:scale(1.2);border-color:var(--text-muted)}
.product-add-btn{width:100%;margin-top:1rem;padding:.75rem;background:var(--dark);color:var(--gold-light);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .2s;border-radius:1px}
.product-add-btn:hover{background:var(--maroon)}

/* Banner */
.banner-section{background:var(--maroon);padding:5rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.banner-content .section-tag{color:var(--gold-light)}
.banner-content .section-title{color:var(--white)}
.banner-content p{color:rgba(255,255,255,.75);font-size:.88rem;line-height:1.9;margin:1.5rem 0 2rem;letter-spacing:.04em}
.banner-img{border-radius:2px;overflow:hidden;position:relative}
.banner-img img{height:500px;width:100%;object-fit:cover}
.banner-badge{position:absolute;bottom:2rem;left:2rem;background:var(--gold);color:var(--dark);padding:1rem 1.5rem;border-radius:1px}
.banner-badge-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;line-height:1}
.banner-badge-text{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;font-weight:600;margin-top:.2rem}

/* Testimonials */
.testimonials{background:var(--cream-dark);padding:6rem 3rem}
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem}
.testimonial-card{background:var(--white);padding:2.5rem;border-radius:2px;border:1px solid var(--border);position:relative}
.testimonial-card::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:6rem;color:var(--gold);opacity:.2;position:absolute;top:.5rem;left:1.5rem;line-height:1}
.stars{display:flex;gap:.2rem;margin-bottom:1.2rem}
.star{color:var(--gold);font-size:1rem}
.testimonial-text{font-size:.88rem;line-height:1.9;color:var(--text-muted);margin-bottom:1.5rem;position:relative;z-index:1}
.testimonial-author{display:flex;align-items:center;gap.8rem;gap:.8rem}
.author-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.author-name{font-weight:600;font-size:.88rem;color:var(--dark)}
.author-city{font-size:.7rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase}

/* Newsletter */
.newsletter{background:var(--dark);padding:5rem 3rem;text-align:center}
.newsletter h2{font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:var(--white);margin-bottom:.8rem}
.newsletter p{color:rgba(255,255,255,.6);font-size:.85rem;letter-spacing:.05em;margin-bottom:2rem}
.newsletter-form{display:flex;max-width:500px;margin:0 auto;gap:0}
.newsletter-input{flex:1;padding:.9rem 1.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(196,146,42,.3);color:#fff;font-size:.82rem;letter-spacing:.05em;outline:none;border-right:none}
.newsletter-input::placeholder{color:rgba(255,255,255,.35)}
.newsletter-input:focus{border-color:var(--gold);background:rgba(255,255,255,.12)}
.newsletter-submit{background:var(--gold);color:var(--dark);padding:.9rem 2rem;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;transition:all .2s;white-space:nowrap}
.newsletter-submit:hover{background:var(--gold-light)}

/* Footer */
.footer{background:var(--dark2);color:rgba(255,255,255,.65);padding:4rem 3rem 2rem}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.footer-brand .nav-logo{font-size:1.8rem;margin-bottom:1rem;display:block}
.footer-brand p{font-size:.82rem;line-height:1.9;max-width:280px}
.footer-social{display:flex;gap:.8rem;margin-top:1.5rem}
.social-btn{width:36px;height:36px;border:1px solid rgba(196,146,42,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.social-btn:hover{background:var(--gold);border-color:var(--gold)}
.social-btn svg{width:16px;height:16px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:1.5}
.social-btn:hover svg{stroke:#fff}
.footer-col h4{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--gold-light);margin-bottom:1.2rem;font-weight:600}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:.6rem}
.footer-links a{font-size:.78rem;letter-spacing:.04em;color:rgba(255,255,255,.55);transition:color .2s}
.footer-links a:hover{color:var(--gold-light)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center}
.footer-copy{font-size:.72rem;letter-spacing:.06em}
.footer-payments{display:flex;gap:.6rem;align-items:center}
.payment-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:.3rem .7rem;border-radius:3px;font-size:.65rem;letter-spacing:.08em;color:rgba(255,255,255,.6)}

/* Shop Page */
.shop-hero{height:35vh;background:linear-gradient(to right,var(--dark),var(--dark2));display:flex;align-items:flex-end;padding:0 3rem 3rem;margin-top:80px}
.shop-hero h1{font-size:3.5rem;color:var(--white);font-weight:600}
.shop-hero span{color:var(--gold)}
.shop-layout{display:grid;grid-template-columns:260px 1fr;gap:2.5rem;padding:3rem}
.filters{position:sticky;top:100px;background:var(--white);border:1px solid var(--border);padding:1.8rem;border-radius:2px;align-self:start}
.filter-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--dark);margin-bottom:1.5rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.filter-section{margin-bottom:1.8rem}
.filter-section h4{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.9rem;font-weight:600}
.filter-options{display:flex;flex-direction:column;gap:.5rem}
.filter-check{display:flex;align-items:center;gap:.6rem;cursor:pointer}
.filter-check input[type=checkbox]{width:15px;height:15px;accent-color:var(--maroon);cursor:pointer}
.filter-check span{font-size:.8rem;color:var(--text)}
.filter-check:hover span{color:var(--maroon)}
.price-range{display:flex;align-items:center;gap:.5rem}
.price-input{width:80px;padding:.4rem .6rem;border:1px solid var(--border);font-size:.8rem;color:var(--text);border-radius:1px;outline:none}
.price-input:focus{border-color:var(--gold)}
.price-dash{color:var(--text-muted)}
.filter-apply{width:100%;padding:.7rem;background:var(--maroon);color:var(--white);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;transition:all .2s;border-radius:1px;margin-top:.5rem}
.filter-apply:hover{background:var(--dark)}
.shop-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.shop-count{font-size:.82rem;color:var(--text-muted);letter-spacing:.06em}
.shop-sort{padding:.5rem 1rem;border:1px solid var(--border);background:var(--white);font-size:.78rem;color:var(--text);outline:none;cursor:pointer;border-radius:1px}
.shop-sort:focus{border-color:var(--gold)}
.products-grid-shop{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}

/* Product Detail */
.product-detail{display:grid;grid-template-columns:1fr 1fr;gap:4rem;padding:3rem;margin-top:80px}
.pd-gallery{position:sticky;top:100px;align-self:start}
.pd-main-img{aspect-ratio:3/4;overflow:hidden;border-radius:2px;margin-bottom:1rem;border:1px solid var(--border)}
.pd-main-img img{width:100%;height:100%;object-fit:cover}
.pd-thumbs{display:flex;gap:.8rem}
.pd-thumb{width:80px;aspect-ratio:1;overflow:hidden;border-radius:1px;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.pd-thumb.active,.pd-thumb:hover{border-color:var(--gold)}
.pd-thumb img{width:100%;height:100%;object-fit:cover}
.pd-info{padding:2rem 0}
.pd-brand{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.pd-title{font-size:2.8rem;font-weight:600;color:var(--dark);line-height:1.1;margin-bottom:.5rem}
.pd-fabric{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.5rem}
.pd-rating{display:flex;align-items:center;gap:.8rem;margin-bottom:1.5rem}
.pd-stars{display:flex;gap:.2rem}
.pd-review-count{font-size:.78rem;color:var(--text-muted)}
.pd-price{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--maroon);font-weight:600;margin-bottom:.5rem}
.pd-price-row{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
.pd-original{font-size:1.2rem;color:var(--text-muted);text-decoration:line-through;font-family:'Cormorant Garamond',serif}
.pd-save{background:var(--maroon);color:#fff;padding:.3rem .8rem;font-size:.7rem;font-weight:600;border-radius:1px;letter-spacing:.08em}
.pd-section-title{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:.8rem}
.pd-colors{display:flex;gap:.7rem;margin-bottom:1.8rem;flex-wrap:wrap}
.pd-color-opt{display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer}
.pd-color-swatch{width:32px;height:32px;border-radius:50%;border:2px solid transparent;transition:all .2s}
.pd-color-opt.active .pd-color-swatch{border-color:var(--dark);box-shadow:0 0 0 3px var(--gold)}
.pd-color-label{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.pd-sizes{display:flex;gap:.6rem;margin-bottom:2rem;flex-wrap:wrap}
.pd-size-btn{padding:.5rem 1.2rem;border:1.5px solid var(--border);font-size:.78rem;color:var(--text);transition:all .2s;cursor:pointer;border-radius:1px;background:var(--white)}

.pd-add-btn:hover{background:var(--dark)}
.pd-buy-btn{padding:1rem 2.5rem;background:var(--gold);color:var(--dark);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;transition:all .25s;border-radius:1px;width:100%;display:flex;align-items:center;justify-content:center;gap:.6rem}
.pd-buy-btn:hover{background:var(--gold-light)}
.pd-features{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:2rem}
.pd-feature{display:flex;align-items:center;gap:.6rem;font-size:.78rem;color:var(--text-muted)}
.pd-feature svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2;flex-shrink:0}
.pd-accordion{border-top:1px solid var(--border)}
.pd-accord-item{border-bottom:1px solid var(--border)}
.pd-accord-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;cursor:pointer;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--text)}
.pd-accord-header:hover{color:var(--maroon)}
.pd-accord-content{padding:.5rem 0 1rem;font-size:.82rem;line-height:1.8;color:var(--text-muted)}

/* Cart Drawer */
.cart-overlay{position:fixed;inset:0;background:rgba(26,8,0,.5);z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px)}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:420px;background:var(--white);z-index:2001;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--dark)}
.cart-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--cream-dark);transition:all .2s}
.cart-close:hover{background:var(--gold)}
.cart-close svg{width:18px;height:18px;stroke:var(--dark);fill:none;stroke-width:2}
.cart-items{flex:1;overflow-y:auto;padding:1.5rem}
.cart-empty{text-align:center;padding:3rem 1rem}
.cart-empty svg{width:64px;height:64px;stroke:var(--text-muted);fill:none;stroke-width:1;margin:0 auto 1.5rem}
.cart-empty h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--dark);margin-bottom:.5rem}
.cart-empty p{font-size:.82rem;color:var(--text-muted);margin-bottom:1.5rem}
.cart-item{display:grid;grid-template-columns:80px 1fr auto;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.ci-img{aspect-ratio:3/4;overflow:hidden;border-radius:1px;border:1px solid var(--border)}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--dark);margin-bottom:.2rem;line-height:1.3}
.ci-meta{font-size:.68rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
.ci-qty{display:flex;align-items:center;gap:.5rem}
.ci-qty-btn{width:26px;height:26px;border:1px solid var(--border);background:var(--cream-dark);display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;border-radius:1px}
.ci-qty-btn:hover{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.ci-qty-num{font-size:.88rem;font-weight:600;width:24px;text-align:center}
.ci-price{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--maroon)}
.ci-remove{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--cream-dark);transition:all .2s;align-self:start;margin-top:.5rem}
.ci-remove:hover{background:#fde8e8;color:var(--maroon)}
.ci-remove svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.cart-footer{padding:1.5rem;border-top:1px solid var(--border);background:var(--cream)}
.cart-subtotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cart-subtotal span{font-size:.82rem;color:var(--text-muted);letter-spacing:.05em}
.cart-subtotal strong{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--dark)}
.cart-shipping-note{font-size:.72rem;color:var(--text-muted);margin-bottom:1.2rem;padding:.6rem;background:rgba(196,146,42,.1);border:1px solid rgba(196,146,42,.2);border-radius:1px;text-align:center}
.cart-checkout-btn{width:100%;padding:1rem;background:var(--maroon);color:#fff;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;transition:all .2s;border-radius:1px;display:flex;align-items:center;justify-content:center;gap:.5rem}
.cart-checkout-btn:hover{background:var(--dark)}
.cart-continue{width:100%;padding:.8rem;background:transparent;color:var(--text-muted);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;margin-top:.6rem;transition:color .2s;text-align:center}
.cart-continue:hover{color:var(--maroon)}

/* Checkout */
.checkout-page{min-height:100vh;padding:6rem 3rem 3rem;background:var(--cream)}
.checkout-grid{display:grid;grid-template-columns:1fr 420px;gap:3rem;max-width:1100px;margin:0 auto}
.checkout-form-section h2{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--dark);margin-bottom:2rem}
.form-group{margin-bottom:1.2rem}
.form-label{display:block;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:.4rem}
.form-input{width:100%;padding:.8rem 1rem;border:1px solid var(--border);background:var(--white);font-size:.85rem;color:var(--text);outline:none;transition:border-color .2s;border-radius:1px}
.form-input:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-section-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--dark);margin:1.8rem 0 1rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.form-section-divider{height:1px;background:var(--border);margin:1.5rem 0}
.payment-methods{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.5rem}
.payment-method{display:flex;align-items:center;gap:.8rem;padding:.9rem 1rem;border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all .2s;border-radius:1px}
.payment-method.active,.payment-method:hover{border-color:var(--gold);background:rgba(196,146,42,.04)}
.payment-method input[type=radio]{accent-color:var(--maroon)}
.payment-method label{font-size:.82rem;color:var(--text);cursor:pointer;font-weight:500}
.payment-method span{margin-left:auto;font-size:.7rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.checkout-order-summary{background:var(--white);border:1px solid var(--border);padding:1.8rem;border-radius:2px;position:sticky;top:100px;align-self:start}
.cos-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--dark);margin-bottom:1.5rem;padding-bottom:.8rem;border-bottom:1px solid var(--border)}
.cos-items{margin-bottom:1.5rem;max-height:300px;overflow-y:auto}
.cos-item{display:flex;gap:.8rem;padding:.7rem 0;border-bottom:1px solid var(--border)}
.cos-item:last-child{border-bottom:none}
.cos-img{width:56px;aspect-ratio:3/4;overflow:hidden;border-radius:1px;border:1px solid var(--border)}
.cos-img img{width:100%;height:100%;object-fit:cover}
.cos-item-name{font-size:.82rem;font-weight:600;color:var(--dark);margin-bottom:.2rem}
.cos-item-meta{font-size:.7rem;color:var(--text-muted)}
.cos-item-price{margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--maroon);white-space:nowrap}
.cos-totals{border-top:1px solid var(--border);padding-top:1rem}
.cos-row{display:flex;justify-content:space-between;font-size:.82rem;color:var(--text-muted);margin-bottom:.5rem}
.cos-row.total{font-size:1rem;font-weight:700;color:var(--dark);margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border)}
.cos-row.total span:last-child{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--maroon)}
.cos-coupon{display:flex;gap:0;margin-top:1.2rem}
.cos-coupon input{flex:1;padding:.65rem 1rem;border:1px solid var(--border);border-right:none;font-size:.8rem;outline:none}
.cos-coupon input:focus{border-color:var(--gold)}
.cos-coupon button{padding:.65rem 1.2rem;background:var(--dark);color:var(--gold-light);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;white-space:nowrap;transition:all .2s}
.cos-coupon button:hover{background:var(--maroon)}
.place-order-btn{width:100%;padding:1.1rem;background:var(--maroon);color:#fff;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700;transition:all .25s;border-radius:1px;margin-top:1.5rem;display:flex;align-items:center;justify-content:center;gap:.8rem}
.place-order-btn:hover{background:var(--dark)}
.place-order-btn:disabled{opacity:.6;cursor:not-allowed}
.secure-badges{display:flex;justify-content:center;gap:1.2rem;margin-top:1.2rem}
.secure-badge{display:flex;align-items:center;gap:.4rem;font-size:.65rem;color:var(--text-muted);letter-spacing:.06em}
.secure-badge svg{width:14px;height:14px;stroke:var(--gold);fill:none;stroke-width:2}

/* Auth Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,8,0,.6);z-index:3000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);width:440px;border-radius:2px;overflow:hidden;transform:translateY(20px);transition:transform .3s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{background:var(--dark);padding:2.5rem;text-align:center;position:relative}
.modal-header h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--white);font-weight:600}
.modal-header p{color:rgba(255,255,255,.55);font-size:.78rem;margin-top:.3rem;letter-spacing:.06em}
.modal-close{position:absolute;top:1rem;right:1rem;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-close svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}
.modal-body{padding:2rem}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.modal-tab{flex:1;padding:.8rem;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;font-weight:600;text-align:center;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;cursor:pointer}
.modal-tab.active{color:var(--maroon);border-bottom-color:var(--maroon)}
.modal-submit{width:100%;padding:.9rem;background:var(--maroon);color:#fff;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;transition:all .2s;border-radius:1px;margin-top:1rem}
.modal-submit:hover{background:var(--dark)}
.modal-divider{text-align:center;font-size:.75rem;color:var(--text-muted);margin:1rem 0;position:relative}
.modal-divider::before,.modal-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.modal-divider::before{left:0}
.modal-divider::after{right:0}
.social-login{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.social-login-btn{padding:.8rem;border:1px solid var(--border);font-size:.75rem;letter-spacing:.08em;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;border-radius:1px;color:var(--text)}
.social-login-btn:hover{border-color:var(--gold);background:var(--cream)}

/* Success Page */
.success-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 2rem;background:var(--cream)}
.success-card{background:var(--white);max-width:580px;width:100%;border-radius:2px;border:1px solid var(--border);overflow:hidden;text-align:center}
.success-header{background:linear-gradient(135deg,var(--maroon),var(--dark));padding:3rem}
.success-icon{width:80px;height:80px;border-radius:50%;background:rgba(196,146,42,.2);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}

.success-header h1{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--white);font-weight:600;margin-bottom:.5rem}
.success-header p{color:rgba(255,255,255,.65);font-size:.85rem;letter-spacing:.05em}
.success-body{padding:2.5rem}
.success-order-id{background:var(--cream-dark);border:1px solid var(--border);padding:1rem;border-radius:1px;font-size:.82rem;color:var(--text-muted);margin-bottom:1.5rem}
.success-order-id strong{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--dark);display:block;margin-top:.2rem}
.success-steps{display:flex;justify-content:space-between;margin:2rem 0;position:relative}
.success-steps::before{content:'';position:absolute;top:20px;left:10%;right:10%;height:2px;background:var(--gold);opacity:.3}
.success-step{display:flex;flex-direction:column;align-items:center;gap:.5rem;position:relative}
.success-step-dot{width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center}
.success-step-dot svg{width:18px;height:18px;stroke:var(--dark);fill:none;stroke-width:2}
.success-step span{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);max-width:80px;text-align:center}
.success-btns{display:flex;flex-direction:column;gap:.8rem;margin-top:2rem}

/* Wishlist indicator */
.wishlist-count{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--dark);font-size:.6rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

/* Toast */
.toast-container{position:fixed;bottom:2rem;right:2rem;z-index:5000;display:flex;flex-direction:column;gap:.5rem}
.toast{background:var(--dark);color:#fff;padding:1rem 1.5rem;border-radius:2px;font-size:.8rem;letter-spacing:.05em;display:flex;align-items:center;gap:.8rem;box-shadow:var(--shadow-lg);transform:translateX(120%);transition:transform .4s cubic-bezier(.4,0,.2,1);border-left:3px solid var(--gold);min-width:280px}
.toast.show{transform:translateX(0)}
.toast svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:2;flex-shrink:0}
.toast.success{border-left-color:#4CAF50}
.toast.success svg{stroke:#4CAF50}
.toast.error{border-left-color:var(--maroon)}
.toast.error svg{stroke:var(--maroon)}

/* Responsive tweaks */
@media(max-width:1100px){
  .products-grid{grid-template-columns:repeat(3,1fr)}
  .categories-grid{grid-template-columns:repeat(3,1fr)}
  .cat-card:first-child{grid-column:span 1;aspect-ratio:3/4}
}
@media(max-width:900px){
  .section{padding:4rem 1.5rem}
  .nav-main{padding:.8rem 1.5rem}
  .nav-links{display:none}
  .products-grid,.products-grid-shop{grid-template-columns:repeat(2,1fr)}
  .shop-layout{grid-template-columns:1fr}
  .checkout-grid{grid-template-columns:1fr}
  .product-detail{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr 1fr}
  .banner-section{grid-template-columns:1fr}
  .testimonials-grid{grid-template-columns:1fr}
  .categories-grid{grid-template-columns:repeat(2,1fr)}
  .hero-title{font-size:3rem}
  .checkout-page{padding:5rem 1.5rem 2rem}
}
@media(max-width:600px){
  .products-grid,.products-grid-shop{grid-template-columns:1fr}
  .cart-drawer{width:100%}
  .hero-content{padding:0 1.5rem}
  .stats-bar{flex-wrap:wrap;gap:1rem;padding:1.2rem 1.5rem}
  .hero-title{font-size:2.5rem}
}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeInUp .7s ease forwards}
.animate-delay-1{animation-delay:.1s;opacity:0}
.animate-delay-2{animation-delay:.2s;opacity:0}
.animate-delay-3{animation-delay:.3s;opacity:0}

/* Loading spinner */
.spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

/* ─── TOAST ─── */
function useToast(){
  const [toasts,setToasts] = useState([]);
  const addToast = useCallback((msg,type='success')=>{
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  return {toasts,addToast};
}

/* ─── PRODUCT CARD ─── */
function ProductCard({product,onAddToCart,onViewDetail,wishlist,toggleWishlist}){
  const [activeColor,setActiveColor] = useState(0);
  const isWished = wishlist.includes(product.id);
  const discount = Math.round((1-product.price/product.original)*100);

  return(
    <div className="product-card" onClick={()=>onViewDetail(product)}>
      <div className="product-img-wrap">
        <img src={product.images[0]} alt={product.name} className="product-img"/>
        <div className="product-badges">
          {product.badge&&<span className={`badge badge-${product.badge}`}>{product.badge==='hot'?'Bestseller':product.badge==='new'?'New':product.badge==='sale'?'Sale':product.badge}</span>}
        </div>
        <div className="product-actions">
          <button className={`action-btn${isWished?' wishlisted':''}`} onClick={e=>{e.stopPropagation();toggleWishlist(product.id)}} title="Wishlist"><Icon.heart/></button>
          <button className="action-btn" onClick={e=>{e.stopPropagation();onViewDetail(product)}} title="Quick view"><Icon.search/></button>
        </div>
      </div>
      <div className="product-info">
        <div className="product-name">{product.name}</div>
        <div className="product-fabric">{product.fabric}</div>
        <div className="product-colors">
          {product.colors.map((c,i)=>(
            <div key={i} className={`color-dot${i===activeColor?' active':''}`} style={{background:c}} onClick={e=>{e.stopPropagation();setActiveColor(i)}} title={c}/>
          ))}
        </div>
        <div className="product-pricing">
          <span className="product-price">{formatPrice(product.price)}</span>
          {product.original&&<span className="product-original">{formatPrice(product.original)}</span>}
          {discount>0&&<span className="product-discount">{discount}% off</span>}
        </div>
        <button className="product-add-btn" onClick={e=>{e.stopPropagation();onAddToCart(product,1,'5m',product.colors[activeColor]);}}>Add to Cart</button>
      </div>
    </div>
  );
}

/* ─── CHECKOUT PAGE ─── */
function CheckoutPage({cart,clearCart,setPage,addToast}){
  const [form,setForm] = useState({firstName:'',lastName:'',email:'',phone:'',address:'',city:'',state:'',pincode:'',paymentMethod:'razorpay'});
  const [coupon,setCoupon] = useState('');
  const [couponApplied,setCouponApplied] = useState(false);
  const [loading,setLoading] = useState(false);
  const subtotal = cart.reduce((s,i)=>s+i.product.price*i.qty,0);
  const shipping = subtotal>=2999?0:149;
  const discount = couponApplied?Math.round(subtotal*0.1):0;
  const total = subtotal+shipping-discount;

  const handleInput=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));

  const validateForm=()=>{
    const required=['firstName','lastName','email','phone','address','city','state','pincode'];
    for(const f of required){if(!form[f].trim()){addToast(`Please fill in ${f.replace(/([A-Z])/g,' $1').toLowerCase()}`,'error');return false;}}
    if(!/^\d{10}$/.test(form.phone)){addToast('Enter a valid 10-digit phone number','error');return false;}
    if(!/\S+@\S+\.\S+/.test(form.email)){addToast('Enter a valid email address','error');return false;}
    if(!/^\d{6}$/.test(form.pincode)){addToast('Enter a valid 6-digit PIN code','error');return false;}
    return true;
  };

  const handleRazorpayPayment=()=>{
    if(!validateForm()) return;
    setLoading(true);
    // Razorpay integration
    const options={
      key:'rzp_test_YOUR_KEY_HERE', // Replace with your Razorpay Test Key
      amount:total*100, // Amount in paise
      currency:'INR',
      name:'Vasantra',
      description:'Purchase of Premium Sarees',
      image:'https://via.placeholder.com/80x80/8B1A1A/C4922A?text=V',
      handler:function(response){
        setLoading(false);
        clearCart();
        setPage('success',{orderId:generateOrderId(),paymentId:response.razorpay_payment_id,total});
        addToast('Payment successful! Order placed. 🎉','success');
      },
      prefill:{name:form.firstName+' '+form.lastName,email:form.email,contact:'+91'+form.phone},
      theme:{color:'#7B1818'},
      modal:{ondismiss:()=>setLoading(false)},
    };
    try{
      const rzp=new window.Razorpay(options);
      rzp.on('payment.failed',function(){setLoading(false);addToast('Payment failed. Please try again.','error');});
      rzp.open();
    }catch(e){
      setLoading(false);
      addToast('Razorpay not loaded. Please add your API key.','error');
    }
  };

  const handleCOD=()=>{
    if(!validateForm()) return;
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      clearCart();
      setPage('success',{orderId:generateOrderId(),paymentId:'COD',total});
      addToast('Order placed! Cash on delivery selected. 🎉','success');
    },1200);
  };

  const handleSubmit=()=>{
    if(form.paymentMethod==='razorpay') handleRazorpayPayment();
    else handleCOD();
  };

  return(
    <div className="checkout-page">
      <div style={{marginBottom:'2rem',cursor:'pointer',color:'var(--text-muted)',fontSize:'.8rem',letterSpacing:'.1em',textTransform:'uppercase',display:'flex',alignItems:'center',gap:'.4rem'}} onClick={()=>setPage('shop')}>
        ← Back to Shopping
      </div>
      <div className="checkout-grid">
        <div className="checkout-form-section">
          <h2>Complete Your Order</h2>
          <div className="form-section-title">Contact Information</div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">First Name*</label><input className="form-input" name="firstName" value={form.firstName} onChange={handleInput} placeholder="Enter first name"/></div>
            <div className="form-group"><label className="form-label">Last Name*</label><input className="form-input" name="lastName" value={form.lastName} onChange={handleInput} placeholder="Enter last name"/></div>
          </div>
          <div className="form-group"><label className="form-label">Email Address*</label><input className="form-input" name="email" type="email" value={form.email} onChange={handleInput} placeholder="your@email.com"/></div>
          <div className="form-group"><label className="form-label">Phone Number*</label><input className="form-input" name="phone" type="tel" value={form.phone} onChange={handleInput} placeholder="10-digit mobile number"/></div>
          <div className="form-section-title">Delivery Address</div>
          <div className="form-group"><label className="form-label">Street Address*</label><input className="form-input" name="address" value={form.address} onChange={handleInput} placeholder="House/Flat no, Street, Area"/></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">City*</label><input className="form-input" name="city" value={form.city} onChange={handleInput} placeholder="City"/></div>
            <div className="form-group"><label className="form-label">State*</label>
              <select className="form-input" name="state" value={form.state} onChange={handleInput}>
                <option value="">Select State</option>
                {['Andhra Pradesh','Assam','Bihar','Delhi','Goa','Gujarat','Haryana','Karnataka','Kerala','Maharashtra','Madhya Pradesh','Odisha','Punjab','Rajasthan','Tamil Nadu','Telangana','Uttar Pradesh','West Bengal'].map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group" style={{maxWidth:'200px'}}><label className="form-label">PIN Code*</label><input className="form-input" name="pincode" value={form.pincode} onChange={handleInput} placeholder="6-digit PIN"/></div>
          <div className="form-section-title">Payment Method</div>
          <div className="payment-methods">
            {[
              {id:'razorpay',label:'Online Payment',sub:'Credit/Debit Card, UPI, Net Banking, Wallets'},
              {id:'cod',label:'Cash on Delivery',sub:'Pay when you receive'},
            ].map(m=>(
              <div key={m.id} className={`payment-method${form.paymentMethod===m.id?' active':''}`} onClick={()=>setForm(f=>({...f,paymentMethod:m.id}))}>
                <input type="radio" id={m.id} name="payment" value={m.id} checked={form.paymentMethod===m.id} onChange={()=>{}}/>
                <div>
                  <label htmlFor={m.id}>{m.label}</label>
                  <div style={{fontSize:'.72rem',color:'var(--text-muted)',marginTop:'.2rem',letterSpacing:'.06em'}}>{m.sub}</div>
                </div>
                {m.id==='razorpay'&&<span>Secure</span>}
                {m.id==='cod'&&<span>Free</span>}
              </div>
            ))}
          </div>
          {form.paymentMethod==='razorpay'&&(
            <div style={{background:'rgba(196,146,42,.08)',border:'1px solid rgba(196,146,42,.2)',padding:'1rem',borderRadius:'1px',fontSize:'.8rem',color:'var(--text-muted)',marginBottom:'1rem'}}>
              🔒 Your payment is secured by Razorpay with 256-bit SSL encryption. We never store your card details.
            </div>
          )}
          <button className="place-order-btn" onClick={handleSubmit} disabled={loading}>
            {loading?<div className="spinner"/>:null}
            {loading?'Processing...':`Place Order — ${formatPrice(total)}`}
          </button>
          <div className="secure-badges">
            <span className="secure-badge"><Icon.lock/>SSL Secured</span>
            <span className="secure-badge"><Icon.shield/>100% Safe</span>
            <span className="secure-badge"><Icon.refresh/>Easy Returns</span>
          </div>
        </div>
        <div className="checkout-order-summary">
          <div className="cos-title">Order Summary</div>
          <div className="cos-items">
            {cart.map(item=>(
              <div key={item.id} className="cos-item">
                <div className="cos-img"><img src={item.product.images[0]} alt={item.product.name}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="cos-item-name">{item.product.name}</div>
                  <div className="cos-item-meta">Qty: {item.qty} · {item.size}</div>
                </div>
                <span className="cos-item-price">{formatPrice(item.product.price*item.qty)}</span>
              </div>
            ))}
          </div>
          <div className="cos-coupon">
            <input value={coupon} onChange={e=>setCoupon(e.target.value)} placeholder="Coupon code (VASANTRA10)"/>
            <button onClick={()=>{if(coupon.trim().toUpperCase()==='VASANTRA10'){setCouponApplied(true);addToast('Coupon applied! 10% off','success');}else{addToast('Invalid coupon code','error');}}}>Apply</button>
          </div>
          <div className="cos-totals">
            <div className="cos-row"><span>Subtotal</span><span>{formatPrice(subtotal)}</span></div>
            <div className="cos-row"><span>Shipping</span><span>{shipping===0?'Free':formatPrice(shipping)}</span></div>
            {couponApplied&&<div className="cos-row" style={{color:'var(--gold)'}}><span>Discount (10%)</span><span>−{formatPrice(discount)}</span></div>}
            <div className="cos-row total"><span>Total</span><span>{formatPrice(total)}</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── SUCCESS PAGE ─── */
function SuccessPage({orderData,setPage}){
  const {orderId='',paymentId='',total=0} = orderData||{};
  return(
    <div className="success-page">
      <div className="success-card">
        <div className="success-header">
          <div className="success-icon"><Icon.check/></div>
          <h1>Order Confirmed!</h1>
          <p>Your beautiful saree is on its way to you</p>
        </div>
        <div className="success-body">
          <div className="success-order-id">
            Order ID<strong>{orderId}</strong>
            {paymentId!=='COD'&&<span style={{fontSize:'.72rem',color:'var(--text-muted)',display:'block',marginTop:'.3rem'}}>Payment ID: {paymentId}</span>}
          </div>
          <p style={{fontSize:'.85rem',color:'var(--text-muted)',lineHeight:'1.7',marginBottom:'1.5rem'}}>Thank you for shopping with Vasantra! Your order has been confirmed and will be delivered in 5–7 business days. You'll receive email updates with tracking information.</p>
          <div style={{background:'var(--cream)',padding:'1rem',borderRadius:'1px',border:'1px solid var(--border)',display:'flex',justifyContent:'space-between',marginBottom:'1.5rem'}}>
            <span style={{fontSize:'.8rem',color:'var(--text-muted)'}}>Total Paid</span>
            <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.3rem',fontWeight:'700',color:'var(--maroon)'}}>{formatPrice(total)}</span>
          </div>
          <div className="success-steps">
            {[['Confirmed','check'],['Processing','refresh'],['Shipped','truck'],['Delivered','heart']].map(([label,icon])=>(
              <div key={label} className="success-step">
                <div className="success-step-dot">
                  {icon==='check'&&<Icon.check/>}{icon==='refresh'&&<Icon.refresh/>}{icon==='truck'&&<Icon.truck/>}{icon==='heart'&&<Icon.heart/>}
                </div>
                <span>{label}</span>
              </div>
            ))}
          </div>
          <div className="success-btns">
            <button className="btn-primary" style={{justifyContent:'center'}} onClick={()=>setPage('shop')}>Continue Shopping <Icon.arrow/></button>
            <button onClick={()=>setPage('home')} style={{padding:'.85rem',border:'1px solid var(--border)',color:'var(--text-muted)',fontSize:'.75rem',letterSpacing:'.12em',textTransform:'uppercase',borderRadius:'1px',transition:'all .2s',background:'transparent'}}>Go to Homepage</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── AUTH MODAL ─── */
function AuthModal({open,onClose}){
  const [tab,setTab] = useState('login');
  const [form,setForm] = useState({name:'',email:'',password:'',phone:''});
  const handleInput=e=>setForm(f=>({...f,[e.target.name]:e.target.value}));
  return(
    <div className={`modal-overlay${open?' open':''}`} onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>{tab==='login'?'Welcome Back':'Create Account'}</h2>
          <p>{tab==='login'?'Sign in to access your orders & wishlist':'Join thousands of saree lovers'}</p>
          <button className="modal-close" onClick={onClose}><Icon.x/></button>
        </div>
        <div className="modal-body">
          <div className="modal-tabs">
            <div className={`modal-tab${tab==='login'?' active':''}`} onClick={()=>setTab('login')}>Sign In</div>
            <div className={`modal-tab${tab==='register'?' active':''}`} onClick={()=>setTab('register')}>Create Account</div>
          </div>
          {tab==='register'&&(
            <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" name="name" value={form.name} onChange={handleInput} placeholder="Your full name"/></div>
          )}
          <div className="form-group"><label className="form-label">Email Address</label><input className="form-input" name="email" type="email" value={form.email} onChange={handleInput} placeholder="your@email.com"/></div>
          {tab==='register'&&(
            <div className="form-group"><label className="form-label">Phone Number</label><input className="form-input" name="phone" value={form.phone} onChange={handleInput} placeholder="10-digit mobile"/></div>
          )}
          <div className="form-group"><label className="form-label">Password</label><input className="form-input" name="password" type="password" value={form.password} onChange={handleInput} placeholder="••••••••"/></div>
          {tab==='login'&&<div style={{textAlign:'right',marginBottom:'.5rem'}}><a href="#" style={{fontSize:'.75rem',color:'var(--maroon)',letterSpacing:'.06em'}}>Forgot password?</a></div>}
          <button className="modal-submit" onClick={onClose}>{tab==='login'?'Sign In':'Create Account'}</button>
          <div className="modal-divider">or continue with</div>
          <div className="social-login">
            <button className="social-login-btn">🇬 Google</button>
            <button className="social-login-btn">f Facebook</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── TOAST DISPLAY ─── */
function ToastContainer({toasts}){
  return(
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.type} show`}>
          {t.type==='success'?<Icon.check/>:<Icon.x/>}
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ─── MAIN APP ─── */
function App(){
  const [page,setPage] = useState('home');
  const [pageData,setPageData] = useState(null);
  const [cart,setCart] = useState([]);
  const [wishlist,setWishlist] = useState([]);
  const [cartOpen,setCartOpen] = useState(false);
  const [authOpen,setAuthOpen] = useState(false);
  const [loading,setLoading] = useState(true);
  const {toasts,addToast} = useToast();

  useEffect(()=>{ setTimeout(()=>setLoading(false),1800); },[]);

  const navigateTo = (p,data=null)=>{ setPage(p); setPageData(data); window.scrollTo({top:0,behavior:'smooth'}); };

  const addToCart=(product,qty=1,size='5m',color=product.colors[0])=>{
    setCart(c=>{
      const key=`${product.id}-${size}-${color}`;
      const existing=c.find(i=>i.id===key);
      if(existing) return c.map(i=>i.id===key?{...i,qty:i.qty+qty}:i);
      return [...c,{id:key,product,qty,size,color}];
    });
    addToast(`${product.name} added to cart!`,'success');
  };

  const updateQty=(id,qty)=>{
    if(qty<1){ setCart(c=>c.filter(i=>i.id!==id)); return; }
    setCart(c=>c.map(i=>i.id===id?{...i,qty}:i));
  };

  const removeItem=(id)=>setCart(c=>c.filter(i=>i.id!==id));
  const clearCart=()=>setCart([]);

  const toggleWishlist=(id)=>{
    setWishlist(w=>w.includes(id)?w.filter(x=>x!==id):[...w,id]);
    addToast(wishlist.includes(id)?'Removed from wishlist':'Added to wishlist ♡');
  };

  const cartCount=cart.reduce((s,i)=>s+i.qty,0);

  if(loading) return(
    <div className="page-loader">
      <div className="loader-logo">Vasantra</div>
      <div className="loader-bar"/>
    </div>
  );

  return(
    <>
      {page!=='success'&&(
        <Navbar page={page} setPage={navigateTo} cartCount={cartCount} wishCount={wishlist.length} onCartOpen={()=>setCartOpen(true)} onAuthOpen={()=>setAuthOpen(true)}/>
      )}
      {page==='home'&&<HomePage setPage={navigateTo} onAddToCart={addToCart} onViewDetail={(p)=>navigateTo('detail',p)} wishlist={wishlist} toggleWishlist={toggleWishlist}/>}
      {page==='shop'&&<ShopPage onAddToCart={addToCart} onViewDetail={(p)=>navigateTo('detail',p)} wishlist={wishlist} toggleWishlist={toggleWishlist} setPage={navigateTo}/>}
      {page==='detail'&&pageData&&<ProductDetailPage product={pageData} onAddToCart={addToCart} setPage={navigateTo} wishlist={wishlist} toggleWishlist={toggleWishlist} addToast={addToast}/>}
      {page==='checkout'&&<CheckoutPage cart={cart} clearCart={clearCart} setPage={navigateTo} addToast={addToast}/>}
      {page==='success'&&<SuccessPage orderData={pageData} setPage={navigateTo}/>}
      <CartDrawer open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart} updateQty={updateQty} removeItem={removeItem} setPage={(p)=>{setCartOpen(false);navigateTo(p);}}/>
      <AuthModal open={authOpen} onClose={()=>setAuthOpen(false)}/>
      <ToastContainer toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
